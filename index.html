<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Awin Jomon | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <img src="myphoto.jpg" class="hero-img">
    <h1 class="hero-name">Awin Jomon</h1>
    <p class="hero-title">Full Stack Developer</p>
    <a href="#main" class="btn">Enter Portfolio</a>
  </div>
</section>

<div id="main">

<nav class="navbar">
  <h2 class="logo">Awin<span>Jomon</span></h2>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#certifications">Certifications</a></li>
    <li><a href="#feedback">Feedback</a></li>
  </ul>
</nav>

<section class="about" id="about">
  <h2>About Me</h2>
  <p>BCA Student | Web Developer | Cloud & AI Learner</p>
</section>

<section class="certifications-page" id="certifications">
  <h2>My Certifications</h2>
  <div id="certContainer" class="cert-grid"></div>
</section>

<section id="feedback">
  <h2>Feedback</h2>

  <form id="feedbackForm">
    <input type="text" id="fbName" placeholder="Your Name" required>
    <input type="email" id="fbEmail" placeholder="Your Email" required>
    <textarea id="fbMessage" placeholder="Your Message" required></textarea>
    <button type="submit" class="btn">Submit Feedback</button>
  </form>

  <div id="feedbackList"></div>
</section>

<footer>
  © 2026 Awin Jomon | All Rights Reserved
</footer>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">×</span>
    <iframe id="pdfViewer"></iframe>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
